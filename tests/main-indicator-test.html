<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8">
  <title>GRPT main indicator test</title>
</head>
<body>
  <main>
    <div id="actions">
      <button id="want-button" style="width:220px;height:40px;padding:8px 16px;color:white;background:#3f8363;border:1px solid #3f8363;border-radius:20px;font:600 14px Arial">Want to Read</button>
      <div id="buy-row" style="display:flex;width:220px;height:40px;margin-top:8px">
        <a id="buy-button" href="https://www.amazon.com/" style="display:flex;align-items:center;justify-content:center;width:220px;height:40px;padding:8px 16px;box-sizing:border-box;color:#382110;background:#f4f1ea;border:1px solid #d6d0c4;border-radius:20px;font:600 14px Arial;text-decoration:none">Buy on Amazon</a>
      </div>
    </div>
    <div class="Button__container"><button aria-label="Book details and editions">Book details &amp; editions</button></div>
    <a href="/work/quotes/999">Quotes</a>
  </main>
  <pre id="result">Executando…</pre>
  <script>
    (async () => {
      history.replaceState({}, '', '/book/show/123');
      const originalFetch = window.fetch.bind(window);
      const editionHtml = await originalFetch('/tests/fixtures/portuguese-page-1.html').then((response) => response.text());
      const storage = {};
      window.chrome = {
        runtime: { onMessage: { addListener() {} } },
        storage: {
          local: {
            async get(key) { return { [key]: storage[key] }; },
            async set(value) { Object.assign(storage, value); },
            async remove(key) { delete storage[key]; }
          }
        }
      };
      const requestedUrls = [];
      window.fetch = async (url) => {
        requestedUrls.push(String(url));
        return { ok: true, status: 200, text: async () => editionHtml };
      };
      const loadScript = (src) => new Promise((resolve, reject) => {
        const script = document.createElement('script');
        script.src = src;
        script.onload = resolve;
        script.onerror = reject;
        document.head.appendChild(script);
      });
      await loadScript('/shared.js');
      await loadScript('/content.js');
      await new Promise((resolve) => setTimeout(resolve, 1800));

      const globalShadow = document.getElementById('grpt-extension-root')?.shadowRoot;
      const mainHost = document.querySelector('[data-grpt-main-host]');
      const mainShadow = mainHost?.shadowRoot;
      const badge = mainShadow?.querySelector('.grpt-badge');
      badge?.click();
      await new Promise((resolve) => setTimeout(resolve, 250));
      const panel = globalShadow?.querySelector('.panel');
      const panelRect = panel?.getBoundingClientRect();
      const ownColorBeforeNativeChange = getComputedStyle(badge).backgroundColor;
      document.getElementById('want-button').style.backgroundColor = '#8a4f7d';
      document.getElementById('want-button').style.borderColor = '#8a4f7d';
      window.dispatchEvent(new Event('resize'));
      const ownColorAfterNativeChange = getComputedStyle(badge).backgroundColor;
      const checks = {
        badgeRestored: badge?.textContent.includes('Portuguese editions') === true,
        badgeBelowBuy: mainHost?.previousElementSibling === document.getElementById('buy-row'),
        badgeKeepsNativeHeight: getComputedStyle(badge).height === getComputedStyle(document.getElementById('buy-button')).height,
        badgeUsesOwnColor: getComputedStyle(badge).backgroundColor === 'rgb(36, 107, 82)'
          && getComputedStyle(badge).backgroundColor !== getComputedStyle(document.getElementById('want-button')).backgroundColor
          && getComputedStyle(badge).backgroundColor !== getComputedStyle(document.getElementById('buy-button')).backgroundColor,
        badgeIgnoresNativeColorChanges: ownColorAfterNativeChange === ownColorBeforeNativeChange,
        badgeCornersAreSymmetric: getComputedStyle(badge).borderTopLeftRadius === getComputedStyle(badge).borderTopRightRadius
          && getComputedStyle(badge).borderTopRightRadius === getComputedStyle(badge).borderBottomRightRadius
          && getComputedStyle(badge).borderBottomRightRadius === getComputedStyle(badge).borderBottomLeftRadius,
        badgeUsesSymmetricClip: getComputedStyle(badge).clipPath !== 'none',
        elegantControlHasFlagAndCount: Boolean(badge?.querySelector('.brazil-flag'))
          && badge?.querySelector('.grpt-count')?.textContent === '1',
        oneRequestOnly: requestedUrls.length === 1,
        doesNotRefetchBookPage: requestedUrls.every((url) => !url.includes('/book/show/')),
        firstPageOnly: requestedUrls[0]?.includes('/work/editions/999') === true,
        editionsPanelOpens: globalShadow?.querySelectorAll('.edition').length === 1,
        panelAdaptsToContent: panelRect?.height >= 280 && panelRect?.height <= 380,
        panelFitsViewport: panelRect?.width <= document.documentElement.clientWidth - (window.innerWidth <= 600 ? 16 : 32)
          && panelRect?.height <= document.documentElement.clientHeight - (window.innerWidth <= 600 ? 16 : 32),
        panelUsesResponsiveResize: Boolean(panel) && (window.innerWidth <= 600
          ? getComputedStyle(panel).resize === 'none'
          : getComputedStyle(panel).resize === 'both'),
        panelReceivesInitialFocus: globalShadow?.activeElement === panel,
        elegantPanelHeader: Boolean(panel?.querySelector('.panel-header-icon .brazil-flag'))
          && panel?.querySelector('.panel-title')?.textContent === 'Portuguese editions'
          && panel?.querySelector('.panel-summary')?.textContent === 'At least 1 edition found',
        goodreadsDomUntouched: !document.querySelector('.grpt-badge, .panel')
      };
      const passed = Object.values(checks).every(Boolean);
      document.body.dataset.status = passed ? 'passed' : 'failed';
      document.getElementById('result').textContent = JSON.stringify({ passed, requestedUrls, checks }, null, 2);
    })().catch((error) => {
      document.body.dataset.status = 'failed';
      document.getElementById('result').textContent = error.stack || String(error);
    });
  </script>
</body>
</html>
